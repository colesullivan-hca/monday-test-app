<!DOCTYPE html>
<html>
<head>
  <title>My Board View</title>
  <script src="https://cdn.jsdelivr.net/npm/monday-sdk-js/dist/main.js"></script>
</head>
<body>

    <h2 id="item-name">Loading item...</h2>
    <div id="column-container">
        <p class="loading">Fetching column data...</p>
    </div>

    <script>
        const monday = mondaySdk();

        async function fetchItemData() {
            try {
                // 1. Get the context (tells us which item/board we are looking at)
                const context = await monday.get("context");
                const itemId = context.data.itemId || context.data.itemIds[0];

                if (!itemId) {
                    document.getElementById('item-name').innerText = "No item selected.";
                    return;
                }

                // 2. Query the monday API for this specific item's columns
                const query = `query {
                    items (ids: [${itemId}]) {
                        name
                        column_values {
                            column {
                                title
                            }
                            text
                        }
                    }
                }`;

                const response = await monday.api(query);
                const item = response.data.items[0];

                renderData(item);
            } catch (error) {
                console.error(error);
                document.getElementById('column-container').innerHTML = "Error loading data.";
            }
        }

        function renderData(item) {
            document.getElementById('item-name').innerText = item.name;
            const container = document.getElementById('column-container');
            container.innerHTML = ""; // Clear loading text

            item.column_values.forEach(cv => {
                const row = document.createElement('div');
                row.className = 'column-row';
                row.innerHTML = `
                    <span class="column-name">${cv.column.title}</span>
                    <span class="column-value">${cv.text || '<em>Empty</em>'}</span>
                `;
                container.appendChild(row);
            });
        }

        fetchItemData();
    </script>
</body>
</html>
