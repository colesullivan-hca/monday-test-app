<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monday Item Viewer</title>
    <link rel="stylesheet" href="style.css">
    <!-- Load monday.com SDK first -->
    <script src="https://cdn.jsdelivr.net/npm/monday-sdk-js/dist/main.js"></script>
</head>
<body>

    <header>
        <h2 id="item-name">Loading...</h2>
    </header>

    <main id="column-container">
        <p class="status-message">Initializing SDK...</p>
    </main>

    <div>
        <div class="item-dropdown">
            <label for="options">Choose an item:</label>
            <select name="options" id="options">
                <option value=""></option>
            </select>
        </div>
    </div>

    <!-- Your logic goes last -->
    <script src="script.js"></script>
</body>
</html>
