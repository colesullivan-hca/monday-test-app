<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ITD Out-of-State Travel Tracker</title>
  <script src="https://cdn.jsdelivr.net/npm/monday-sdk-js/dist/main.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
  <link rel="stylesheet" href="styles.css">
  <script src="app.js" type="module"></script>
</head>
<body>

  <!-- Full-screen loader -->
  <div id="loader" class="loader">
    <div class="loader__spinner"></div>
    <p class="loader__text">Loading trip data…</p>
  </div>

  <!-- App shell: sidebar + detail panel -->
  <div class="app-shell">

    <!-- LEFT: Trip list -->
    <aside class="sidebar">
      <div class="sidebar__header">
        <span class="sidebar__title">Active Trips</span>
        <span class="sidebar__sync" id="last-synced"></span>
      </div>
      <div class="sidebar__list" id="sidebar-list">
        <!-- Populated by render.js renderSidebar() -->
      </div>
    </aside>

    <!-- RIGHT: Detail panel -->
    <main class="detail-panel" id="detail-panel">
      <!-- Populated by render.js renderDetail() / renderEmptyState() -->
    </main>

  </div>

  <button type="button" class="corner-bookmark">
    <svg xmlns="http://www.w3.org/2000/svg"
        width="24"
        height="24"
        viewBox="0 0 24 24"
        fill="none">
      <circle cx="12" cy="12" r="10" fill="#3B82F6"/>
      <circle cx="12" cy="7" r="1.4" fill="white"/>
      <path d="M12 10v6" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
    </svg>
  </button>

</body>
</html>
