<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ITD Out-of-State Travel Tracker</title>
  <script src="https://cdn.jsdelivr.net/npm/monday-sdk-js/dist/main.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
  <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
  <link rel="stylesheet" href="styles.css">
  <script src="app.js" type="module"></script>
</head>
<body>

  <!-- Full-screen loader -->
  <div id="loader" class="loader">
    <div class="loader__spinner"></div>
    <p class="loader__text">Loading trip data…</p>
  </div>

  <!-- App shell: sidebar + detail panel -->
  <div class="app-shell">

    <!-- LEFT: Trip list -->
    <aside class="sidebar">
      <div class="sidebar__header">
        <span class="sidebar__title">Active Trips</span>
        <span class="sidebar__sync" id="last-synced"></span>
      </div>
      <div class="sidebar__list" id="sidebar-list">
        <!-- Populated by render.js renderSidebar() -->
      </div>
    </aside>

    <!-- RIGHT: Detail panel -->
    <main class="detail-panel" id="detail-panel">
      <!-- Populated by render.js renderDetail() / renderEmptyState() -->
    </main>

  </div>

  <dialog id="travel-info-modal" class="travel-info-modal">
  </dialog>

  <script>
    (async () => {
        try {
          const response = await fetch('travel-info-modal.html');
          if (!response.ok) {
            throw new Error(`HTTP error! status: ${response.status}`);
          }
          const htmlText = await response.text();
          document.getElementById('travel-info-modal').innerHTML = htmlText;
        } catch (error) {
          console.error('Error loading the HTML:', error);
          document.getElementById('travel-info-modal').innerHTML = '<p>Failed to load content.</p>';
        }
      })();
  </script>

  <button type="button" class="corner-bookmark" id="travel-info-trigger" aria-haspopup="dialog" aria-controls="travel-info-modal">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
      <circle cx="12" cy="12" r="10" fill="#2563eb"/>
      <path d="M12 16.8a1 1 0 1 1 0 2a1 1 0 0 1 0-2zm0-10a3.5 3.5 0 0 1 3.5 3.5c0 1.8-1 2.8-2.2 3.6-.9.6-1.3 1-1.3 1.6v.3h-2v-.6c0-1.5.8-2.4 1.8-3.1 1-.7 1.7-1.3 1.7-2.2a1.5 1.5 0 1 0-3 0h-2A3.5 3.5 0 0 1 12 6.8z" fill="white"/>
    </svg>
  </button>

</body>
</html>
