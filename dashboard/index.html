<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ITD Out-of-State Travel Request & Reimbursement Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/monday-sdk-js/dist/main.js"></script>
    <link rel="stylesheet" href="styles.css">
    <script src="app.js" type="module"></script>
</head>
<body>
    <div id="loading-screen" class="loading-overlay">
        <div class="spinner"></div>
        <p>Loading Trip Data...</p>
    </div>

    <div class="filter-navigation">
        <button class="filter-btn active" data-target="all">All Trips</button>
        <button class="filter-btn" data-target="pre-travel">Pre-Travel</button>
        <button class="filter-btn" data-target="travelling">Travelling</button>
        <button class="filter-btn" data-target="post-travel">Post-Travel</button>
        <button class="filter-btn" data-target="completed">Completed</button>
    </div>

    <div class="stacks">
        <div class="pre-travel stack"></div>
        <div class="travelling stack"></div>
        <div class="post-travel stack"></div>
        <div class="completed stack"></div>
    </div>
</body>
</html>
